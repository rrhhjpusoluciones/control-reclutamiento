<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control de Reclutamiento y Selección</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const STAGES = ["Requisición","Reclutamiento","Filtro Curricular","Entrevistas","Evaluaciones","Decisión Final","Incorporación"];
    const STAGE_COLORS = ["bg-purple-100 text-purple-700","bg-blue-100 text-blue-700","bg-yellow-100 text-yellow-700","bg-orange-100 text-orange-700","bg-pink-100 text-pink-700","bg-green-100 text-green-700","bg-teal-100 text-teal-700"];
    const STATUS_OPTS = ["En proceso","Aprobado","Rechazado","En espera","Contratado"];
    const STATUS_COLORS = {"En proceso":"bg-blue-100 text-blue-700","Aprobado":"bg-green-100 text-green-700","Rechazado":"bg-red-100 text-red-700","En espera":"bg-yellow-100 text-yellow-700","Contratado":"bg-teal-100 text-teal-700"};
    const SOURCES = ["LinkedIn","Referido","Bolsa de trabajo","Portal empresa","Indeed","OCC","Otro"];

    const emptyCandidate = () => ({
      id: Date.now(), name:"", position:"", area:"", source:"LinkedIn",
      stage:0, status:"En proceso", cvReceived:false, cvScore:"",
      yearsExp:"", techSkills:"", certifications:"", educationLevel:"", englishLevel:"", cvNotes:"", cvResult:"Pendiente",
      hrDate:"", hrResult:"", techDate:"", techResult:"", mgrDate:"", mgrResult:"",
      techTestScore:"", psychoScore:"", evalNotes:"",
      offerSalary:"", offerStatus:"", startDate:"",
      notes:"", openDate: new Date().toISOString().split("T")[0]
    });

    const Field = ({label, children}) => (
      <div className="mb-3">
        <label className="block text-xs font-semibold text-gray-500 mb-1 uppercase tracking-wide">{label}</label>
        {children}
      </div>
    );
    const Input = (props) => <input className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" {...props}/>;
    const Select = ({children, ...props}) => <select className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" {...props}>{children}</select>;
    const Textarea = (props) => <textarea className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 resize-none" rows={2} {...props}/>;

    function CandidateForm({initial, onSave, onCancel}) {
      const [c, setC] = React.useState(initial);
      const upd = (k,v) => setC(x=>({...x,[k]:v}));
      const tab_labels = ["Datos Generales","Filtro Curricular","Entrevistas","Evaluaciones","Decisión e Incorporación"];
      const [tab, setTab] = React.useState(0);
      return (
        <div className="min-h-screen bg-gray-50">
          <div className="bg-indigo-700 text-white px-6 py-4 flex items-center gap-3">
            <button onClick={onCancel} className="text-indigo-200 hover:text-white">←</button>
            <div>
              <h1 className="font-bold">{initial.name?"Editar Candidato":"Nuevo Candidato"}</h1>
              <p className="text-indigo-200 text-xs">{c.name||"Sin nombre"} — {c.position||"Sin puesto"}</p>
            </div>
          </div>
          <div className="max-w-3xl mx-auto px-4 py-6">
            <div className="flex gap-1 mb-6 overflow-x-auto pb-1">
              {tab_labels.map((l,i)=>(
                <button key={i} onClick={()=>setTab(i)} className={`px-3 py-2 rounded-lg text-xs font-semibold whitespace-nowrap transition ${tab===i?"bg-indigo-600 text-white":"bg-white text-gray-500 border border-gray-200 hover:border-indigo-300"}`}>{l}</button>
              ))}
            </div>
            <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
              {tab===0 && (
                <div className="grid grid-cols-2 gap-x-4">
                  <div className="col-span-2"><Field label="Nombre completo"><Input value={c.name} onChange={e=>upd("name",e.target.value)} placeholder="Ej. Juan Pérez"/></Field></div>
                  <Field label="Puesto solicitado"><Input value={c.position} onChange={e=>upd("position",e.target.value)} placeholder="Ej. Ingeniero de Redes"/></Field>
                  <Field label="Área / Departamento"><Input value={c.area} onChange={e=>upd("area",e.target.value)} placeholder="Ej. Infraestructura"/></Field>
                  <Field label="Fuente"><Select value={c.source} onChange={e=>upd("source",e.target.value)}>{SOURCES.map(s=><option key={s}>{s}</option>)}</Select></Field>
                  <Field label="Fecha de apertura"><Input type="date" value={c.openDate} onChange={e=>upd("openDate",e.target.value)}/></Field>
                  <Field label="Etapa actual"><Select value={c.stage} onChange={e=>upd("stage",Number(e.target.value))}>{STAGES.map((s,i)=><option key={s} value={i}>{s}</option>)}</Select></Field>
                  <Field label="Estatus"><Select value={c.status} onChange={e=>upd("status",e.target.value)}>{STATUS_OPTS.map(s=><option key={s}>{s}</option>)}</Select></Field>
                  <div className="col-span-2"><Field label="CV recibido"><label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={c.cvReceived} onChange={e=>upd("cvReceived",e.target.checked)} className="w-4 h-4 accent-indigo-600"/><span className="text-sm text-gray-600">Sí, CV recibido</span></label></Field></div>
                  <div className="col-span-2"><Field label="Notas generales"><Textarea value={c.notes} onChange={e=>upd("notes",e.target.value)}/></Field></div>
                </div>
              )}
              {tab===1 && (
                <div className="grid grid-cols-2 gap-x-4">
                  <Field label="Años de experiencia"><Input value={c.yearsExp} onChange={e=>upd("yearsExp",e.target.value)} placeholder="Ej. 3-5 años"/></Field>
                  <Field label="Nivel educativo"><Select value={c.educationLevel} onChange={e=>upd("educationLevel",e.target.value)}>{["","Técnico","Licenciatura","Ingeniería","Maestría","Doctorado","Otro"].map(o=><option key={o}>{o}</option>)}</Select></Field>
                  <div className="col-span-2"><Field label="Habilidades técnicas"><Input value={c.techSkills} onChange={e=>upd("techSkills",e.target.value)} placeholder="Ej. Python, AWS, CCNA"/></Field></div>
                  <div className="col-span-2"><Field label="Certificaciones"><Input value={c.certifications} onChange={e=>upd("certifications",e.target.value)} placeholder="Ej. CCNA, PMP, AWS"/></Field></div>
                  <Field label="Nivel de inglés"><Select value={c.englishLevel} onChange={e=>upd("englishLevel",e.target.value)}>{["","Básico","Intermedio","Avanzado","Bilingüe","No requerido"].map(o=><option key={o}>{o}</option>)}</Select></Field>
                  <Field label="Resultado del filtro"><Select value={c.cvResult} onChange={e=>upd("cvResult",e.target.value)}>{["Pendiente","Cumple perfil","No cumple perfil","Cumple parcialmente"].map(o=><option key={o}>{o}</option>)}</Select></Field>
                  <div className="col-span-2"><Field label="Observaciones"><Textarea value={c.cvNotes} onChange={e=>upd("cvNotes",e.target.value)}/></Field></div>
                </div>
              )}
              {tab===2 && (
                <div>
                  {[["RH / Primera entrevista","hrDate","hrResult"],["Entrevista Técnica","techDate","techResult"],["Entrevista Gerencial","mgrDate","mgrResult"]].map(([label,dateKey,resKey])=>(
                    <div key={label} className="mb-4 p-4 bg-gray-50 rounded-lg">
                      <p className="text-sm font-semibold text-gray-600 mb-3">{label}</p>
                      <div className="grid grid-cols-2 gap-3">
                        <Field label="Fecha"><Input type="date" value={c[dateKey]} onChange={e=>upd(dateKey,e.target.value)}/></Field>
                        <Field label="Resultado"><Select value={c[resKey]} onChange={e=>upd(resKey,e.target.value)}>{["","Pendiente","Aprobado","Reprogramar","No aprobado","No se presentó"].map(o=><option key={o}>{o}</option>)}</Select></Field>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {tab===3 && (
                <div className="grid grid-cols-2 gap-x-4">
                  <Field label="Puntaje prueba técnica (%)"><Input type="number" min="0" max="100" value={c.techTestScore} onChange={e=>upd("techTestScore",e.target.value)}/></Field>
                  <Field label="Puntaje psicométrica"><Input value={c.psychoScore} onChange={e=>upd("psychoScore",e.target.value)}/></Field>
                  <div className="col-span-2"><Field label="Notas"><Textarea value={c.evalNotes} onChange={e=>upd("evalNotes",e.target.value)}/></Field></div>
                </div>
              )}
              {tab===4 && (
                <div className="grid grid-cols-2 gap-x-4">
                  <Field label="Salario ofertado"><Input value={c.offerSalary} onChange={e=>upd("offerSalary",e.target.value)} placeholder="Ej. $25,000 MXN"/></Field>
                  <Field label="Estatus de oferta"><Select value={c.offerStatus} onChange={e=>upd("offerStatus",e.target.value)}>{["","Pendiente","Aceptada","Rechazada","En negociación"].map(o=><option key={o}>{o}</option>)}</Select></Field>
                  <Field label="Fecha de inicio"><Input type="date" value={c.startDate} onChange={e=>upd("startDate",e.target.value)}/></Field>
                </div>
              )}
            </div>
            <div className="flex justify-end gap-3 mt-6">
              <button onClick={onCancel} className="px-5 py-2 rounded-lg border border-gray-200 text-sm text-gray-600 hover:bg-gray-50">Cancelar</button>
              <button onClick={()=>onSave(c)} className="px-5 py-2 rounded-lg bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700">Guardar candidato</button>
            </div>
          </div>
        </div>
      );
    }

    function CandidateDetail({c, onBack, onEdit, onDelete}) {
      const Section = ({title, children}) => (
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-5 mb-4">
          <h3 className="font-semibold text-gray-700 text-sm mb-3 border-b border-gray-100 pb-2">{title}</h3>
          {children}
        </div>
      );
      const Row = ({label, value}) => value ? (
        <div className="flex justify-between py-1 text-sm"><span className="text-gray-500">{label}</span><span className="text-gray-800 font-medium text-right max-w-xs">{value}</span></div>
      ) : null;
      return (
        <div className="min-h-screen bg-gray-50">
          <div className="bg-indigo-700 text-white px-6 py-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <button onClick={onBack} className="text-indigo-200 hover:text-white">←</button>
              <div><h1 className="font-bold">{c.name}</h1><p className="text-indigo-200 text-xs">{c.position} — {c.area}</p></div>
            </div>
            <div className="flex gap-2">
              <button onClick={()=>onEdit(c)} className="bg-white text-indigo-700 font-semibold text-xs px-3 py-2 rounded-lg">Editar</button>
              <button onClick={()=>onDelete(c.id)} className="bg-red-500 text-white font-semibold text-xs px-3 py-2 rounded-lg">Eliminar</button>
            </div>
          </div>
          <div className="max-w-2xl mx-auto px-4 py-6">
            <div className="flex gap-2 mb-4">
              <span className={`px-3 py-1 rounded-full text-xs font-semibold ${STAGE_COLORS[c.stage]}`}>{STAGES[c.stage]}</span>
              <span className={`px-3 py-1 rounded-full text-xs font-semibold ${STATUS_COLORS[c.status]}`}>{c.status}</span>
            </div>
            <Section title="Datos Generales">
              <Row label="Fuente" value={c.source}/><Row label="Fecha de apertura" value={c.openDate}/><Row label="CV recibido" value={c.cvReceived?"Sí":"No"}/><Row label="Notas" value={c.notes}/>
            </Section>
            <Section title="Filtro Curricular">
              <Row label="Experiencia" value={c.yearsExp}/><Row label="Nivel educativo" value={c.educationLevel}/><Row label="Habilidades técnicas" value={c.techSkills}/><Row label="Certificaciones" value={c.certifications}/><Row label="Inglés" value={c.englishLevel}/><Row label="Resultado" value={c.cvResult}/><Row label="Observaciones" value={c.cvNotes}/>
            </Section>
            <Section title="Entrevistas">
              <Row label="RH — Fecha" value={c.hrDate}/><Row label="RH — Resultado" value={c.hrResult}/><Row label="Técnica — Fecha" value={c.techDate}/><Row label="Técnica — Resultado" value={c.techResult}/><Row label="Gerencial — Fecha" value={c.mgrDate}/><Row label="Gerencial — Resultado" value={c.mgrResult}/>
            </Section>
            <Section title="Evaluaciones">
              <Row label="Prueba técnica" value={c.techTestScore?`${c.techTestScore}%`:""}/><Row label="Psicométrica" value={c.psychoScore}/><Row label="Notas" value={c.evalNotes}/>
            </Section>
            <Section title="Decisión e Incorporación">
              <Row label="Salario ofertado" value={c.offerSalary}/><Row label="Estatus oferta" value={c.offerStatus}/><Row label="Fecha de inicio" value={c.startDate}/>
            </Section>
          </div>
        </div>
      );
    }

    function App() {
      const [candidates, setCandidates] = React.useState([]);
      const [selected, setSelected] = React.useState(null);
      const [view, setView] = React.useState("dashboard");
      const [filterStage, setFilterStage] = React.useState("Todas");
      const [filterStatus, setFilterStatus] = React.useState("Todos");
      const [editing, setEditing] = React.useState(null);

      const save = (c) => {
        if (candidates.find(x=>x.id===c.id)) setCandidates(cs=>cs.map(x=>x.id===c.id?c:x));
        else setCandidates(cs=>[...cs,c]);
        setView("dashboard"); setEditing(null);
      };
      const del = (id) => { setCandidates(cs=>cs.filter(x=>x.id!==id)); setView("dashboard"); };
      const filtered = candidates.filter(c=>{
        if(filterStage!=="Todas" && STAGES[c.stage]!==filterStage) return false;
        if(filterStatus!=="Todos" && c.status!==filterStatus) return false;
        return true;
      });
      const stats = { total:candidates.length, active:candidates.filter(c=>c.status==="En proceso").length, hired:candidates.filter(c=>c.status==="Contratado").length, rejected:candidates.filter(c=>c.status==="Rechazado").length };

      if(view==="form") return <CandidateForm initial={editing||emptyCandidate()} onSave={save} onCancel={()=>{setView("dashboard");setEditing(null);}}/>;
      if(view==="detail"&&selected) return <CandidateDetail c={selected} onBack={()=>setView("dashboard")} onEdit={c=>{setEditing(c);setView("form");}} onDelete={del}/>;

      return (
        <div className="min-h-screen bg-gray-50 font-sans">
          <div className="bg-indigo-700 text-white px-6 py-4 flex items-center justify-between">
            <div>
              <h1 className="text-xl font-bold">Control de Reclutamiento y Selección</h1>
              <p className="text-indigo-200 text-xs mt-0.5">Telecomunicaciones / Tecnología</p>
            </div>
            <button onClick={()=>{setEditing(null);setView("form");}} className="bg-white text-indigo-700 font-semibold text-sm px-4 py-2 rounded-lg hover:bg-indigo-50">+ Nuevo Candidato</button>
          </div>
          <div className="max-w-6xl mx-auto px-4 py-6">
            <div className="grid grid-cols-2 gap-3 mb-6 sm:grid-cols-4">
              {[["Total","total","bg-indigo-50 text-indigo-700"],["En proceso","active","bg-blue-50 text-blue-700"],["Contratados","hired","bg-teal-50 text-teal-700"],["Rechazados","rejected","bg-red-50 text-red-700"]].map(([l,k,cls])=>(
                <div key={k} className={`rounded-xl p-4 ${cls} flex flex-col`}><span className="text-2xl font-bold">{stats[k]}</span><span className="text-xs font-medium mt-1">{l}</span></div>
              ))}
            </div>
            <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4 mb-6 overflow-x-auto">
              <h2 className="text-sm font-semibold text-gray-500 mb-3 uppercase tracking-wide">Pipeline por etapa</h2>
              <div className="flex gap-2 min-w-max">
                {STAGES.map((s,i)=>{
                  const count=candidates.filter(c=>STAGES[c.stage]===s).length;
                  return (<div key={s} className="flex flex-col items-center"><div className={`rounded-lg px-3 py-2 text-xs font-semibold ${STAGE_COLORS[i]} min-w-20 text-center`}>{s}</div><div className="text-lg font-bold text-gray-700 mt-1">{count}</div></div>);
                })}
              </div>
            </div>
            <div className="flex flex-wrap gap-3 mb-4">
              <select className="border border-gray-200 rounded-lg px-3 py-2 text-sm" value={filterStage} onChange={e=>setFilterStage(e.target.value)}>
                <option>Todas</option>{STAGES.map(s=><option key={s}>{s}</option>)}
              </select>
              <select className="border border-gray-200 rounded-lg px-3 py-2 text-sm" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
                <option>Todos</option>{STATUS_OPTS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            {filtered.length===0 ? (
              <div className="bg-white rounded-xl border border-gray-100 p-12 text-center text-gray-400">
                <div className="text-4xl mb-3">📋</div>
                <p className="font-medium">No hay candidatos registrados</p>
                <p className="text-sm mt-1">Haz clic en "Nuevo Candidato" para comenzar</p>
              </div>
            ) : (
              <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <table className="w-full text-sm">
                  <thead className="bg-gray-50 border-b border-gray-100">
                    <tr>{["Candidato","Puesto","Área","Etapa","Estatus","Fecha apertura",""].map(h=><th key={h} className="text-left text-xs font-semibold text-gray-500 uppercase px-4 py-3 tracking-wide">{h}</th>)}</tr>
                  </thead>
                  <tbody>
                    {filtered.map(c=>(
                      <tr key={c.id} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer" onClick={()=>{setSelected(c);setView("detail");}}>
                        <td className="px-4 py-3 font-medium text-gray-800">{c.name||"—"}</td>
                        <td className="px-4 py-3 text-gray-600">{c.position||"—"}</td>
                        <td className="px-4 py-3 text-gray-600">{c.area||"—"}</td>
                        <td className="px-4 py-3"><span className={`px-2 py-1 rounded-full text-xs font-semibold ${STAGE_COLORS[c.stage]}`}>{STAGES[c.stage]}</span></td>
                        <td className="px-4 py-3"><span className={`px-2 py-1 rounded-full text-xs font-semibold ${STATUS_COLORS[c.status]}`}>{c.status}</span></td>
                        <td className="px-4 py-3 text-gray-500 text-xs">{c.openDate}</td>
                        <td className="px-4 py-3" onClick={e=>e.stopPropagation()}>
                          <button onClick={()=>{setEditing(c);setView("form");}} className="text-indigo-500 hover:text-indigo-700 text-xs font-medium mr-3">Editar</button>
                          <button onClick={()=>del(c.id)} className="text-red-400 hover:text-red-600 text-xs font-medium">Eliminar</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
